name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint scripts
        run: shellcheck --severity=warning scripts/*.sh scripts/lib/*.sh firstboot/*.sh flavors/*.sh
      - name: Lint SpookyWrt scripts (OpenWRT ash — local is supported, so exclude SC3043)
        run: shellcheck -s sh --severity=warning --exclude=SC3043 spookywrt/first-boot.sh spookywrt/first-boot-full.sh spookywrt/spooky-setup spookywrt/spooky spookywrt/spooky-capture spookywrt/spooky-vpn spookywrt/setup-ap.sh spookywrt/wifi-audit/firstboot.sh
      - name: Python compile-check (build.py + spooky-agent)
        run: python3 -m py_compile spookywrt/build.py spookywrt/spooky-agent

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: '**/*.md'
